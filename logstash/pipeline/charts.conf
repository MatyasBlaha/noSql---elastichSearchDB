# Logstash pipeline – import žebříčků (charts_clean.csv)
# Čte CSV, transformuje typy a datum, odesílá do indexu 'charts'

input {
  file {
    path => "/usr/share/logstash/data-input/charts_clean.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/dev/null"
  }
}

filter {
  # Přeskočit hlavičku CSV
  if [message] =~ "^title," {
    drop { }
  }

  csv {
    columns => [
      "title", "rank", "date", "artist", "region",
      "chart", "trend", "streams"
    ]
    separator => ","
  }

  # Konverze typů
  mutate {
    convert => {
      "rank" => "integer"
      "streams" => "integer"
    }
  }

  # Parsovat datum
  date {
    match => ["date", "yyyy-MM-dd"]
    target => "date"
  }

  # Vygenerovat deterministicky document ID (rank je unikatni v ramci chart+region+date)
  mutate {
    add_field => { "[@metadata][doc_id]" => "%{date}_%{region}_%{chart}_%{rank}" }
  }

  # Odstranit nepotřebná pole
  mutate {
    remove_field => ["message", "@timestamp", "@version", "event", "host", "log", "path"]
  }
}

output {
  elasticsearch {
    hosts => ["https://es-data-1:9200"]
    index => "charts"
    document_id => "%{[@metadata][doc_id]}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled => true
    ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
  }
}
