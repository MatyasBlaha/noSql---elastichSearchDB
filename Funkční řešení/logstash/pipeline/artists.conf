# Logstash pipeline – import interpretů (artists_clean.csv)
# Čte CSV, transformuje typy, odesílá do indexu 'artists'

input {
  file {
    path => "/usr/share/logstash/data-input/artists_clean.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/dev/null"
  }
}

filter {
  # Přeskočit hlavičku CSV
  if [message] =~ "^id,name,followers" {
    drop { }
  }

  csv {
    columns => [
      "artist_id", "name", "followers", "genres", "popularity",
      "related_artists_count", "related_artists_ids"
    ]
    separator => ","
  }

  # Konverze typů
  mutate {
    convert => {
      "followers" => "integer"
      "popularity" => "integer"
      "related_artists_count" => "integer"
    }
  }

  # Genres – odstranit závorky a rozdělit na pole
  mutate {
    gsub => [
      "genres", "[\[\]']", ""
    ]
  }
  mutate {
    split => { "genres" => ", " }
  }

  # Related artists – rozdělit na pole
  if [related_artists_ids] and [related_artists_ids] != "" {
    mutate {
      split => { "related_artists_ids" => ";" }
    }
  }

  # Odstranit nepotřebná pole
  mutate {
    remove_field => ["message", "@timestamp", "@version", "event", "host", "log", "path"]
  }
}

output {
  elasticsearch {
    hosts => ["https://es-data-1:9200"]
    index => "artists"
    document_id => "%{artist_id}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled => true
    ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
  }
}
