# Logstash pipeline – import skladeb (tracks_clean.csv)
# Čte CSV, transformuje typy, odesílá do indexu 'tracks'

input {
  file {
    path => "/usr/share/logstash/data-input/tracks_clean.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/dev/null"
  }
}

filter {
  # Přeskočit hlavičku CSV
  if [message] =~ "^track_id," {
    drop { }
  }

  csv {
    columns => [
      "track_id", "track_name", "artists", "album_name",
      "popularity", "duration_ms", "explicit", "danceability",
      "energy", "key", "loudness", "mode", "speechiness",
      "acousticness", "instrumentalness", "liveness", "valence",
      "tempo", "time_signature", "track_genre"
    ]
    separator => ","
  }

  # Konverze typů
  mutate {
    convert => {
      "popularity" => "integer"
      "duration_ms" => "integer"
      "danceability" => "float"
      "energy" => "float"
      "key" => "integer"
      "loudness" => "float"
      "mode" => "integer"
      "speechiness" => "float"
      "acousticness" => "float"
      "instrumentalness" => "float"
      "liveness" => "float"
      "valence" => "float"
      "tempo" => "float"
      "time_signature" => "integer"
    }
  }

  # Boolean konverze pro explicit
  # CSV parser vraci string, proto konvertujeme pres ruby filtr
  ruby {
    code => '
      event.set("explicit", event.get("explicit").to_s.strip.downcase == "true")
    '
  }

  # Rozdělit artists na pole (multi-value)
  mutate {
    split => { "artists" => ";" }
  }

  # Odstranit nepotřebná pole z Logstash
  mutate {
    remove_field => ["message", "@timestamp", "@version", "event", "host", "log", "path"]
  }
}

output {
  elasticsearch {
    hosts => ["https://es-data-1:9200"]
    index => "tracks"
    document_id => "%{track_id}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled => true
    ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
  }
}
